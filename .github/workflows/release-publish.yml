name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version of this release
        required: true
      releaseType:
        type: choice
        required: true
        default: alpha
        description: Type of release (alpha, beta, standard)
        options: 
        - alpha
        - beta
        - standard
  push:
    branches:
      - 'release/*'

jobs:
  prerequisite:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/rafiki/env-setup
    - run: pnpm checks

  backend:
    runs-on: ubuntu-latest
    needs: prerequisite
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - run: pnpm --filter backend build:deps
      - run: NODE_OPTIONS=--max-old-space-size=4096 pnpm --filter backend test:ci

  frontend:
    runs-on: ubuntu-latest
    needs: prerequisite
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - run: pnpm --filter frontend typecheck
      - run: pnpm --filter frontend build

  auth:
    runs-on: ubuntu-latest
    needs: prerequisite
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - run: pnpm --filter auth build:deps
      - run: pnpm --filter auth test
      - name: AsyncAPI extension
        run: |
          echo "{\"extends\":[\"spectral:oas\",\"spectral:asyncapi\"]}" >> .spectral.json
      - name: Validate Open API specs
        run: |
          npx @stoplight/spectral-cli lint ./packages/auth/openapi/*.yaml

  token-introspection:
    runs-on: ubuntu-latest
    needs: prerequisite
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - run: pnpm --filter token-introspection test
      - name: AsyncAPI extension
        run: |
          echo "{\"extends\":[\"spectral:oas\",\"spectral:asyncapi\"]}" >> .spectral.json
      - name: Validate Open API specs
        run: |
          npx @stoplight/spectral-cli lint ./packages/token-introspection/openapi/*.yaml

  mock-account-servicing-entity:
    runs-on: ubuntu-latest
    needs: prerequisite
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - run: pnpm --filter mock-account-servicing-entity typecheck
      - run: pnpm --filter mock-account-servicing-entity build

  graphql:
    runs-on: ubuntu-latest
    needs: prerequisite
    strategy:
      matrix:
        package: [auth, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - name: generate ${{ matrix.package }} graphql
        run: pnpm --filter ${{ matrix.package }} generate
      - name: verify changed files
        uses: tj-actions/verify-changed-files@v17
        id: verify-changed-files
        with:
          files: |
            **/generated/graphql.*

      - name: fail if GraphQL was generated
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: exit 1
  
  codeql-analyze:
    runs-on: ubuntu-latest
    needs: [auth, backend, frontend, token-introspection, mock-account-servicing-entity, graphql]
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
        config:
          - './.github/codeql/source.yml'
          - './.github/codeql/tests.yml'
    steps:
     - uses: actions/checkout@v4
     - uses: ./.github/workflows/rafiki/env-setup
     - name: Initialize CodeQL
       uses: github/codeql-action/init@v3
       with:
         languages: ${{ matrix.language }}
         config-file: ${{ matrix.config }}
     - name: Perform CodeQL Analysis
       uses: github/codeql-action/analyze@v3

  node-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: codeql-analyze
    steps: 
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/rafiki/env-setup
      - run: pnpm build
  
  docker-build:
    runs-on: ubuntu-latest
    # needs: node-build
    timeout-minutes: 5
    strategy:
      matrix:
        package: [auth, backend, frontend]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          push: false
          file: packages/${{ matrix.package }}/Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/rafiki-${{ matrix.package }}:${{ github.event.inputs.version }}-${{ github.event.inputs.releaseType }}.${{ github.run_number }}, ghcr.io/${{ github.repository_owner }}/rafiki-${{ matrix.package }}:latest
          outputs: type=docker,dest=/tmp/${{ matrix.package }}.tar
      - name: Save docker image to cache
        uses: actions/cache@v3
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
  
  docker-grype:
    name: Docker Grype Scan
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        package: [auth, backend, frontend]
    steps:
      - name: Fetch docker image from cache
        uses: actions/cache/restore@v3
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
      - name: Scan docker image
        uses: anchore/scan-action@v3
        with:
          image: /tmp/${{ matrix.package }}.tar
          fail-build: true
          only-fixed: true
          severity-cutoff: critical
          output-format: table

  docker-trivy:
    name: Docker Trivy Scan
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        package: [auth, backend, frontend]
    steps:
      - name: Fetch docker image from cache
        uses: actions/cache/restore@v3
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
      - name: Download Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp
      - name: Scan docker image
        run: |
          /tmp/trivy image --ignore-unfixed --format table --vuln-type os,library --exit-code 1 --severity CRITICAL --input /tmp/${{ matrix.package }}.tar
  
  changelog-generator:
    name: Changelog Generator
    # needs: [docker-grype, docker-trivy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.event.inputs.version }}
      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          name: ${{ github.event.inputs.version }}
          body: ${{ steps.changelog.outputs.changes }}
          token: ${{ github.token }}
      - name: Commit CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          branch: main
          commit_message: 'docs: update CHANGELOG.md for ${{ github.event.inputs.version }} [skip ci]'
          file_pattern: CHANGELOG.md