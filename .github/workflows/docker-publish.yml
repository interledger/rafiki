name: Docker Build, Scan & Publish

on:
  workflow_run:
    workflows: [Release & Publish]
    types:
      - completed

# tests and code analysis should be done before
jobs:
  version-generator:
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'release/v*') 
    outputs:
      version: ${{ steps.version-generator.outputs.NEW_VERSION }}
    steps:
      - id: version-generator
        run: |
          # Remove that prefix stuff
          VERSION_PREFIX=$(echo "${{ github.ref_name }}" | sed 's|release/||')

          # Use awk to separate the version into major, minor, patch, and pre-release components
          read major minor patch pre_release <<< $(echo "$VERSION_PREFIX" | awk -F'[.v-]' '{print $2, $3, $4, $5}')

          # Check if there is a pre-release identifier. If so, handle it separately.
          if [ -n "$pre_release" ]; then
              # Fetch the most recent tag, considering it might have a pre-release identifier
              VERSION_PREFIX=$(git tag -l "v$major.$minor.*-$pre_release" --sort=-taggerdate | head -n 1)

              # Increment the patch version
              patch=$((patch + 1))

              # Construct the new version with the pre-release identifier
              NEW_VERSION="v${major}.${minor}.${patch}-${pre_release}"
          else
              # Fetch the most recent tag, considering it might have a pre-release identifier
              VERSION_PREFIX=$(git tag -l "v$major.$minor.*" --sort=-taggerdate | head -n 1)

              # Increment the patch version
              patch=$((patch + 1))

              # Construct the new version without a pre-release identifier
              NEW_VERSION="v${major}.${minor}.${patch}"
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
  
  docker-build:
    runs-on: ubuntu-latest
    needs: version-generator
    timeout-minutes: 5
    strategy:
      matrix:
        package: [auth, backend, frontend]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          push: false
          file: packages/${{ matrix.package }}/Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/rafiki-${{ matrix.package }}:${{ needs.version-generator.outputs.version }}
          outputs: type=docker,dest=/tmp/${{ matrix.package }}.tar
      - name: Save docker image to cache
        uses: actions/cache@v4
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
  
  docker-grype:
    name: Docker Grype Scan
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        package: [auth, backend, frontend]
    steps:
      - name: Fetch docker image from cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
      - name: Scan docker image
        uses: anchore/scan-action@v3
        with:
          image: /tmp/${{ matrix.package }}.tar
          fail-build: true
          only-fixed: true
          severity-cutoff: critical
          output-format: table

  docker-trivy:
    name: Docker Trivy Scan
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        package: [auth, backend, frontend]
    steps:
      - name: Fetch docker image from cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
      - name: Download Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp
      - name: Scan docker image
        run: |
          /tmp/trivy image --ignore-unfixed --format table --vuln-type os,library --exit-code 1 --severity CRITICAL --input /tmp/${{ matrix.package }}.tar
  
  push:
    name: Push to registry
    needs: [docker-grype, docker-trivy, version-generator]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [auth, backend, frontend]

    steps:
      - name: Fetch docker image from cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/${{ matrix.package }}.tar
          key: ${{ github.sha }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load image into Docker
        run: |
          docker load --input /tmp/${{ matrix.package }}.tar
      - name: List docker images
        run: docker images
      - name: Push to registry
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/rafiki-${{ matrix.package }}:${{ needs.version-generator.outputs.version }}
  
  generate-changelog:
    runs-on: ubuntu-latest
    needs: [push, version-generator]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ needs.version-generator.outputs.version }}
      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          name: ${{ needs.version-generator.outputs.version }}
          body: ${{ steps.changelog.outputs.changes }}
          token: ${{ github.token }}
      - name: Commit CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          branch: main
          commit_message: 'docs: update CHANGELOG.md for ${{ needs.version-generator.outputs.version }} [skip ci]'
          file_pattern: CHANGELOG.md